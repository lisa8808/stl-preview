<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modify STL Preview - AI Powered</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: rgba(255,255,255,0.6);
      margin-bottom: 30px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 1.2rem;
      margin-bottom: 20px;
      color: #00d9ff;
    }
    textarea {
      width: 100%;
      height: 120px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px;
      color: #fff;
      font-size: 16px;
      resize: vertical;
      font-family: inherit;
    }
    textarea:focus {
      outline: none;
      border-color: #00d9ff;
    }
    select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      margin-bottom: 20px;
    }
    .btn {
      padding: 14px 32px;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      border: none;
      border-radius: 12px;
      color: #1a1a2e;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.02); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .result {
      margin-top: 20px;
      display: none;
    }
    .result.show { display: block; }
    .result-box {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 20px;
      margin-top: 15px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 14px;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }
    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
    }
    .loading.show { display: block; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #00d9ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .history {
      margin-top: 30px;
    }
    .version-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      margin-bottom: 10px;
    }
    .version-tag {
      background: rgba(0,217,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 14px;
      color: #00d9ff;
    }
    .version-date {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
    .nav {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    .nav a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .nav a:hover, .nav a.active {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav">
      <a href="/">Upload</a>
      <a href="/modify.html" class="active">Modify</a>
      <a href="/history.html">History</a>
    </nav>
    
    <h1>🛠️ Natural Language Modification</h1>
    <p class="subtitle">Describe what you want to change, and AI will modify the code for you</p>
    
    <div class="card">
      <h2>What would you like to change?</h2>
      <select id="targetFile">
        <option value="public/index.html">Upload Page (index.html)</option>
        <option value="api/upload.js">Upload API (upload.js)</option>
        <option value="public/modify.html">Modify Page</option>
      </select>
      <textarea id="instruction" placeholder="Example: Change the background to dark blue, or Add a file size limit warning, or Make the UI Chinese"></textarea>
      
      <div style="margin: 20px 0; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 10px;">
        <p style="font-size: 14px; margin-bottom: 12px; color: rgba(255,255,255,0.7);">API Configuration (optional - leave empty to use server defaults)</p>
        <input type="text" id="apiKey" placeholder="API Key" style="margin-bottom: 10px;">
        <input type="text" id="baseUrl" placeholder="Base URL (e.g. https://open.palebluedot.ai/v1)" style="margin-bottom: 10px;">
        <input type="text" id="modelName" placeholder="Model (e.g. anthropic/claude-opus-4.6)">
      </div>
      
      <button class="btn" id="submitBtn" onclick="submitModify()">Generate Change Plan</button>
    </div>
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="margin-top:15px;color:rgba(255,255,255,0.7)">AI is thinking...</p>
    </div>
    
    <div class="result" id="result">
      <h2 style="color:#00ff88">✅ Change Plan Generated</h2>
      <div class="result-box" id="resultContent"></div>
      <button class="btn" style="margin-top:20px" onclick="applyChanges()">Apply Changes & Create Version</button>
    </div>
  </div>

  <script>
    let currentPlan = null;

    async function submitModify() {
      const instruction = document.getElementById('instruction').value.trim();
      const targetFile = document.getElementById('targetFile').value;
      const apiKey = document.getElementById('apiKey').value.trim();
      const baseUrl = document.getElementById('baseUrl').value.trim();
      const modelName = document.getElementById('modelName').value.trim();
      
      if (!instruction) {
        alert('Please describe what you want to change');
        return;
      }
      
      document.getElementById('loading').classList.add('show');
      document.getElementById('result').classList.remove('show');
      document.getElementById('submitBtn').disabled = true;
      
      try {
        const res = await fetch('/api/modify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            instruction, 
            targetFile,
            apiKey: apiKey || undefined,
            baseUrl: baseUrl || undefined,
            model: modelName || undefined
          })
        });
        
        const data = await res.json();
        
        if (data.success) {
          currentPlan = data.data;
          document.getElementById('resultContent').textContent = JSON.stringify(data.data, null, 2);
          document.getElementById('result').classList.add('show');
        } else {
          alert('Error: ' + (data.error || 'Unknown error'));
        }
      } catch (err) {
        alert('Request failed: ' + err.message);
      } finally {
        document.getElementById('loading').classList.remove('show');
        document.getElementById('submitBtn').disabled = false;
      }
    }
    
    function applyChanges() {
      alert('In full implementation, this would:\n1. Call OpenAI API to generate code changes\n2. Apply the changes to the target file\n3. Create a new Git commit with version tag\n4. Redeploy to Vercel\n\nThis feature requires an OpenAI API key to be configured.');
    }
  </script>
</body>
</html>
