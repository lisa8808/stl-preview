<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Version History - STL Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: rgba(255,255,255,0.6);
      margin-bottom: 30px;
    }
    .nav {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    .nav a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .nav a:hover, .nav a.active {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
    }
    .timeline {
      position: relative;
      padding-left: 30px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, #00d9ff, #00ff88);
    }
    .version {
      position: relative;
      margin-bottom: 30px;
    }
    .version::before {
      content: '';
      position: absolute;
      left: -36px;
      top: 4px;
      width: 14px;
      height: 14px;
      background: #00d9ff;
      border-radius: 50%;
      border: 3px solid #1a1a2e;
    }
    .version-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
    }
    .version-tag {
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      color: #1a1a2e;
      padding: 4px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
    }
    .version-date {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
    .version-title {
      font-size: 1.1rem;
      margin-bottom: 10px;
    }
    .version-changes {
      list-style: none;
      padding: 0;
    }
    .version-changes li {
      padding: 6px 0;
      color: rgba(255,255,255,0.8);
      padding-left: 20px;
      position: relative;
    }
    .version-changes li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: #00ff88;
    }
    .btn {
      padding: 10px 24px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 15px;
    }
    .btn:hover {
      background: rgba(255,255,255,0.2);
    }
    .loading {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #00d9ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav">
      <a href="/">Upload</a>
      <a href="/modify.html">Modify</a>
      <a href="/history.html" class="active">History</a>
    </nav>
    
    <h1>📜 Version History</h1>
    <p class="subtitle">Track all changes made to your STL Preview service</p>
    
    <div class="card">
      <div class="timeline" id="timeline">
        <div class="loading">
          <div class="spinner"></div>
          <p style="margin-top:15px;color:rgba(255,255,255,0.7)">Loading history...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function loadHistory() {
      try {
        const res = await fetch('/api/history');
        const data = await res.json();
        
        if (data.success) {
          renderHistory(data.data);
        }
      } catch (err) {
        document.getElementById('timeline').innerHTML = '<p style="color:#ff6b6b">Failed to load history</p>';
      }
    }
    
    function renderHistory(data) {
      const timeline = document.getElementById('timeline');
      
      let html = `
        <div class="version">
          <div class="version-header">
            <span class="version-tag">${data.current.version}</span>
            <span class="version-date">${new Date(data.current.date).toLocaleDateString()}</span>
          </div>
          <div class="version-title">${data.current.description}</div>
          <ul class="version-changes">
            ${data.current.files.map(f => `<li>${f}</li>`).join('')}
          </ul>
          <button class="btn" onclick="rollback('${data.current.version}')">View Files</button>
        </div>
      `;
      
      data.changelog.forEach(v => {
        if (v.version !== data.current.version) {
          html += `
            <div class="version">
              <div class="version-header">
                <span class="version-tag">${v.version}</span>
                <span class="version-date">${new Date(v.date).toLocaleDateString()}</span>
              </div>
              <ul class="version-changes">
                ${v.changes.map(c => `<li>${c}</li>`).join('')}
              </ul>
              <button class="btn" onclick="rollback('${v.version}')">Rollback to this version</button>
            </div>
          `;
        }
      });
      
      timeline.innerHTML = html;
    }
    
    function rollback(version) {
      alert(`In full implementation, this would rollback to version ${version} and redeploy.`);
    }
    
    loadHistory();
  </script>
</body>
</html>
